####################################
# 💻 Picom Config for i3 + Intel Iris Xe (Blur + Polybar Transparent)
####################################

# Rendering engine
backend = "glx";
vsync = true;

# Prevent tearing in fullscreen (critical!)
unredir-if-possible = false;

# Better damage handling
use-damage = true;

# Shadows (optional, clean shadows)
shadow = true;
shadow-radius = 10;
shadow-offset-x = -10;
shadow-offset-y = -10;
shadow-opacity = 0.2
shadow-exclude = [ "class_g = 'Polybar'" ]

# Rounded corners (optional)
corner-radius = 8;

# Blur (dual_kawase for glass-like effect)
blur-method = "dual_kawase";
blur-strength = 7;
blur-background = true;
blur-background-frame = true;

# ⚠️ Allow blur on Polybar
blur-background-exclude = [ ]  # Previously blocked Polybar

# Opacity fix for Polybar
opacity-rule = [ "100:class_g = 'Polybar'" ]

# Fading (optional)
fading = true;
fade-in-step = 0.05;
fade-out-step = 0.05;
